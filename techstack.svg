<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 300" width="100%" height="100%">
  <defs>
    <!-- Background Card Gradient -->
    <linearGradient id="panel-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F19" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#020408" stop-opacity="0.95"/>
    </linearGradient>

    <!-- Card Fill -->
    <linearGradient id="card-fill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0.4"/>
    </linearGradient>

    <!-- Soft Glow Filter -->
    <filter id="pill-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    .card-border {
      fill: url(#card-fill);
      stroke: #1F2937;
      stroke-width: 1.5;
      transition: all 0.3s ease;
    }
    .card-group:hover .card-border {
      stroke: #6366F1;
      stroke-opacity: 0.8;
      filter: drop-shadow(0 4px 12px rgba(99, 102, 241, 0.15));
    }
    .tech-pill {
      fill: #111827;
      stroke: #1F2937;
      stroke-width: 1;
      cursor: pointer;
      transition: all 0.25s ease;
    }
    .tech-pill:hover {
      fill: #1E293B;
      stroke: #06B6D4;
      filter: url(#pill-glow);
    }
    .tech-text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      font-size: 12px;
      font-weight: 500;
      fill: #94A3B8;
      pointer-events: none;
      transition: fill 0.25s ease;
    }
    .tech-pill:hover + .tech-text {
      fill: #FFFFFF;
      font-weight: 600;
    }
    .card-title {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      pointer-events: none;
    }
  </style>

  <!-- Panel Background -->
  <rect width="980" height="300" rx="12" fill="url(#panel-bg)" stroke="#1F2937" stroke-width="1.5"/>

  <!-- COLUMN 1: FRONTEND -->
  <g class="card-group" transform="translate(15, 20)">
    <rect class="card-border" width="180" height="260" rx="8"/>
    <text class="card-title" x="20" y="30" fill="#6366F1">Frontend</text>
    
    <!-- Pills -->
    <g transform="translate(20, 50)">
      <g>
        <rect class="tech-pill" width="140" height="30" rx="6"/>
        <text class="tech-text" x="70" y="19" text-anchor="middle">React.js</text>
      </g>
      <g transform="translate(0, 40)">
        <rect class="tech-pill" width="140" height="30" rx="6"/>
        <text class="tech-text" x="70" y="19" text-anchor="middle">JavaScript</text>
      </g>
      <g transform="translate(0, 80)">
        <rect class="tech-pill" width="140" height="30" rx="6"/>
        <text class="tech-text" x="70" y="19" text-anchor="middle">HTML5</text>
      </g>
      <g transform="translate(0, 120)">
        <rect class="tech-pill" width="140" height="30" rx="6"/>
        <text class="tech-text" x="70" y="19" text-anchor="middle">CSS3</text>
      </g>
      <g transform="translate(0, 160)">
        <rect class="tech-pill" width="140" height="30" rx="6"/>
        <text class="tech-text" x="70" y="19" text-anchor="middle">Tailwind CSS</text>
      </g>
    </g>
  </g>

  <!-- COLUMN 2: BACKEND -->
  <g class="card-group" transform="translate(205, 20)">
    <rect class="card-border" width="180" height="260" rx="8"/>
    <text class="card-title" x="20" y="30" fill="#06B6D4">Backend</text>
    
    <!-- Pills -->
    <g transform="translate(20, 50)">
      <g>
        <rect class="tech-pill" width="140" height="30" rx="6"/>
        <text class="tech-text" x="70" y="19" text-anchor="middle">Node.js</text>
      </g>
      <g transform="translate(0, 40)">
        <rect class="tech-pill" width="140" height="30" rx="6"/>
        <text class="tech-text" x="70" y="19" text-anchor="middle">Express.js</text>
      </g>
      <g transform="translate(0, 80)">
        <rect class="tech-pill" width="140" height="30" rx="6"/>
        <text class="tech-text" x="70" y="19" text-anchor="middle">Python</text>
      </g>
      <g transform="translate(0, 120)">
        <rect class="tech-pill" width="140" height="30" rx="6"/>
        <text class="tech-text" x="70" y="19" text-anchor="middle">FastAPI</text>
      </g>
    </g>
  </g>

  <!-- COLUMN 3: DATABASE -->
  <g class="card-group" transform="translate(395, 20)">
    <rect class="card-border" width="180" height="260" rx="8"/>
    <text class="card-title" x="20" y="30" fill="#8B5CF6">Database</text>
    
    <!-- Pills -->
    <g transform="translate(20, 50)">
      <g>
        <rect class="tech-pill" width="140" height="30" rx="6"/>
        <text class="tech-text" x="70" y="19" text-anchor="middle">MongoDB</text>
      </g>
      <g transform="translate(0, 40)">
        <rect class="tech-pill" width="140" height="30" rx="6"/>
        <text class="tech-text" x="70" y="19" text-anchor="middle">SQL</text>
      </g>
    </g>
  </g>

  <!-- COLUMN 4: LANGUAGES -->
  <g class="card-group" transform="translate(585, 20)">
    <rect class="card-border" width="180" height="260" rx="8"/>
    <text class="card-title" x="20" y="30" fill="#E2E8F0">Languages</text>
    
    <!-- Pills -->
    <g transform="translate(20, 50)">
      <g>
        <rect class="tech-pill" width="140" height="30" rx="6"/>
        <text class="tech-text" x="70" y="19" text-anchor="middle">JavaScript</text>
      </g>
      <g transform="translate(0, 40)">
        <rect class="tech-pill" width="140" height="30" rx="6"/>
        <text class="tech-text" x="70" y="19" text-anchor="middle">Python</text>
      </g>
      <g transform="translate(0, 80)">
        <rect class="tech-pill" width="140" height="30" rx="6"/>
        <text class="tech-text" x="70" y="19" text-anchor="middle">Java</text>
      </g>
      <g transform="translate(0, 120)">
        <rect class="tech-pill" width="140" height="30" rx="6"/>
        <text class="tech-text" x="70" y="19" text-anchor="middle">SQL</text>
      </g>
    </g>
  </g>

  <!-- COLUMN 5: TOOLS -->
  <g class="card-group" transform="translate(775, 20)">
    <rect class="card-border" width="180" height="260" rx="8"/>
    <text class="card-title" x="20" y="30" fill="#10B981">Tools</text>
    
    <!-- Pills -->
    <g transform="translate(20, 50)">
      <g>
        <rect class="tech-pill" width="140" height="30" rx="6"/>
        <text class="tech-text" x="70" y="19" text-anchor="middle">Git</text>
      </g>
      <g transform="translate(0, 40)">
        <rect class="tech-pill" width="140" height="30" rx="6"/>
        <text class="tech-text" x="70" y="19" text-anchor="middle">GitHub</text>
      </g>
      <g transform="translate(0, 80)">
        <rect class="tech-pill" width="140" height="30" rx="6"/>
        <text class="tech-text" x="70" y="19" text-anchor="middle">VS Code</text>
      </g>
      <g transform="translate(0, 120)">
        <rect class="tech-pill" width="140" height="30" rx="6"/>
        <text class="tech-text" x="70" y="19" text-anchor="middle">Vercel</text>
      </g>
    </g>
  </g>
</svg>
