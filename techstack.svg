<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 300" width="100%" height="100%">
  <defs>
    <!-- Background Card Gradient -->
    <linearGradient id="panel-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#090505" stop-opacity="0.98"/>
    </linearGradient>

    <!-- Card Fill -->
    <linearGradient id="card-fill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0A" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.9"/>
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="card-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes card-pulse {
      0%, 100% { stroke: #1F1F1F; }
      50% { stroke: #FF0000; stroke-opacity: 0.6; }
    }
    @keyframes float-pill {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
    }

    .card-border {
      fill: url(#card-fill);
      stroke: #1F1F1F;
      stroke-width: 1.5;
      transition: all 0.3s ease;
    }
    .card-group:hover .card-border {
      stroke: #FF0000;
      stroke-opacity: 0.9;
      fill: #050000;
      filter: url(#card-glow);
    }
    .active-pulse-1 { animation: card-pulse 4s infinite ease-in-out; }
    .active-pulse-2 { animation: card-pulse 4s infinite ease-in-out 1s; }
    .active-pulse-3 { animation: card-pulse 4s infinite ease-in-out 2s; }
    .active-pulse-4 { animation: card-pulse 4s infinite ease-in-out 3s; }
    
    .tech-pill {
      fill: #0A0A0A;
      stroke: #1F1F1F;
      stroke-width: 1;
      cursor: pointer;
      transition: all 0.25s ease;
    }
    .tech-pill:hover {
      fill: #140505;
      stroke: #FF0000;
      filter: drop-shadow(0 0 6px rgba(255, 0, 0, 0.5));
    }
    .tech-text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      font-size: 12px;
      font-weight: 500;
      fill: #808080;
      pointer-events: none;
      transition: fill 0.25s ease;
    }
    .tech-pill:hover + .tech-text {
      fill: #FFFFFF;
      font-weight: 600;
    }
    .card-title {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      pointer-events: none;
    }
    .float-item-1 { animation: float-pill 3s infinite ease-in-out; }
    .float-item-2 { animation: float-pill 3.5s infinite ease-in-out 0.5s; }
    .float-item-3 { animation: float-pill 3s infinite ease-in-out 1s; }
    .float-item-4 { animation: float-pill 4s infinite ease-in-out 1.5s; }
  </style>

  <!-- Panel Background -->
  <rect width="980" height="300" rx="12" fill="url(#panel-bg)" stroke="#1F1F1F" stroke-width="1.5"/>

  <!-- COLUMN 1: FRONTEND -->
  <g class="card-group" transform="translate(15, 20)">
    <rect class="card-border active-pulse-1" width="180" height="260" rx="8"/>
    <text class="card-title" x="20" y="30" fill="#FF0000">Frontend</text>
    
    <!-- Pills -->
    <g transform="translate(20, 50)">
      <g class="float-item-1">
        <rect class="tech-pill" width="140" height="30" rx="6"/>
        <text class="tech-text" x="70" y="19" text-anchor="middle">React.js</text>
      </g>
      <g class="float-item-2" transform="translate(0, 40)">
        <rect class="tech-pill" width="140" height="30" rx="6"/>
        <text class="tech-text" x="70" y="19" text-anchor="middle">JavaScript</text>
      </g>
      <g class="float-item-3" transform="translate(0, 80)">
        <rect class="tech-pill" width="140" height="30" rx="6"/>
        <text class="tech-text" x="70" y="19" text-anchor="middle">HTML5</text>
      </g>
      <g class="float-item-4" transform="translate(0, 120)">
        <rect class="tech-pill" width="140" height="30" rx="6"/>
        <text class="tech-text" x="70" y="19" text-anchor="middle">CSS3</text>
      </g>
      <g class="float-item-1" transform="translate(0, 160)">
        <rect class="tech-pill" width="140" height="30" rx="6"/>
        <text class="tech-text" x="70" y="19" text-anchor="middle">Tailwind CSS</text>
      </g>
    </g>
  </g>

  <!-- COLUMN 2: BACKEND -->
  <g class="card-group" transform="translate(205, 20)">
    <rect class="card-border active-pulse-2" width="180" height="260" rx="8"/>
    <text class="card-title" x="20" y="30" fill="#FF0000">Backend</text>
    
    <!-- Pills -->
    <g transform="translate(20, 50)">
      <g class="float-item-2">
        <rect class="tech-pill" width="140" height="30" rx="6"/>
        <text class="tech-text" x="70" y="19" text-anchor="middle">Node.js</text>
      </g>
      <g class="float-item-3" transform="translate(0, 40)">
        <rect class="tech-pill" width="140" height="30" rx="6"/>
        <text class="tech-text" x="70" y="19" text-anchor="middle">Express.js</text>
      </g>
      <g class="float-item-4" transform="translate(0, 80)">
        <rect class="tech-pill" width="140" height="30" rx="6"/>
        <text class="tech-text" x="70" y="19" text-anchor="middle">Python</text>
      </g>
      <g class="float-item-1" transform="translate(0, 120)">
        <rect class="tech-pill" width="140" height="30" rx="6"/>
        <text class="tech-text" x="70" y="19" text-anchor="middle">FastAPI</text>
      </g>
    </g>
  </g>

  <!-- COLUMN 3: DATABASE -->
  <g class="card-group" transform="translate(395, 20)">
    <rect class="card-border active-pulse-3" width="180" height="260" rx="8"/>
    <text class="card-title" x="20" y="30" fill="#FF0000">Database</text>
    
    <!-- Pills -->
    <g transform="translate(20, 50)">
      <g class="float-item-3">
        <rect class="tech-pill" width="140" height="30" rx="6"/>
        <text class="tech-text" x="70" y="19" text-anchor="middle">MongoDB</text>
      </g>
      <g class="float-item-4" transform="translate(0, 40)">
        <rect class="tech-pill" width="140" height="30" rx="6"/>
        <text class="tech-text" x="70" y="19" text-anchor="middle">SQL</text>
      </g>
    </g>
  </g>

  <!-- COLUMN 4: LANGUAGES -->
  <g class="card-group" transform="translate(585, 20)">
    <rect class="card-border active-pulse-4" width="180" height="260" rx="8"/>
    <text class="card-title" x="20" y="30" fill="#FF0000">Languages</text>
    
    <!-- Pills -->
    <g transform="translate(20, 50)">
      <g class="float-item-4">
        <rect class="tech-pill" width="140" height="30" rx="6"/>
        <text class="tech-text" x="70" y="19" text-anchor="middle">JavaScript</text>
      </g>
      <g class="float-item-1" transform="translate(0, 40)">
        <rect class="tech-pill" width="140" height="30" rx="6"/>
        <text class="tech-text" x="70" y="19" text-anchor="middle">Python</text>
      </g>
      <g class="float-item-2" transform="translate(0, 80)">
        <rect class="tech-pill" width="140" height="30" rx="6"/>
        <text class="tech-text" x="70" y="19" text-anchor="middle">Java</text>
      </g>
      <g class="float-item-3" transform="translate(0, 120)">
        <rect class="tech-pill" width="140" height="30" rx="6"/>
        <text class="tech-text" x="70" y="19" text-anchor="middle">SQL</text>
      </g>
    </g>
  </g>

  <!-- COLUMN 5: TOOLS -->
  <g class="card-group" transform="translate(775, 20)">
    <rect class="card-border active-pulse-1" width="180" height="260" rx="8"/>
    <text class="card-title" x="20" y="30" fill="#FF0000">Tools</text>
    
    <!-- Pills -->
    <g transform="translate(20, 50)">
      <g class="float-item-1">
        <rect class="tech-pill" width="140" height="30" rx="6"/>
        <text class="tech-text" x="70" y="19" text-anchor="middle">Git</text>
      </g>
      <g class="float-item-2" transform="translate(0, 40)">
        <rect class="tech-pill" width="140" height="30" rx="6"/>
        <text class="tech-text" x="70" y="19" text-anchor="middle">GitHub</text>
      </g>
      <g class="float-item-3" transform="translate(0, 80)">
        <rect class="tech-pill" width="140" height="30" rx="6"/>
        <text class="tech-text" x="70" y="19" text-anchor="middle">VS Code</text>
      </g>
      <g class="float-item-4" transform="translate(0, 120)">
        <rect class="tech-pill" width="140" height="30" rx="6"/>
        <text class="tech-text" x="70" y="19" text-anchor="middle">Vercel</text>
      </g>
    </g>
  </g>
</svg>
