<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 360" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="panel-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#0a0505" stop-opacity="0.99"/>
    </linearGradient>

    <!-- Cyber Coordinates Grid -->
    <pattern id="cyber-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#FF0000" stroke-width="0.5" stroke-opacity="0.08"/>
    </pattern>

    <!-- Radial Power Core Glow -->
    <radialGradient id="pulsing-glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#FF0000" stop-opacity="0.1">
        <animate attributeName="stop-opacity" values="0.1;0.01;0.1" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- Image Rounding Clip Path -->
    <clipPath id="image-clip">
      <rect x="25" y="25" width="220" height="310" rx="12" />
    </clipPath>
  </defs>

  <style>
    @keyframes glitch-name {
      0%, 100% { transform: translate(0); text-shadow: 0.5px 0.5px 0.5px rgba(255,0,0,0.5); }
      20% { transform: translate(-0.5px, 0.5px); text-shadow: -0.5px 0 1px #ff0000; }
      40% { transform: translate(0.5px, -0.5px); text-shadow: 0.5px 0.5px 2px #ff0000; }
      60% { transform: translate(-0.5px, -0.5px); text-shadow: -0.5px -0.5px 1px #ff0000; }
      80% { transform: translate(0.5px, 0.5px); text-shadow: 0.5px -0.5px 2px #ff0000; }
    }
    
    @keyframes role-cycle {
      0%, 25% { opacity: 0; transform: translateY(8px); }
      3.5%, 21.5% { opacity: 1; transform: translateY(0); }
      25%, 100% { opacity: 0; }
    }

    @keyframes float-widget {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    @keyframes cursor-blink {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }

    @keyframes code-type-line {
      0% { opacity: 0; }
      8% { opacity: 1; }
      92% { opacity: 1; }
      100% { opacity: 0; }
    }

    .text-name {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 32px;
      font-weight: 900;
      fill: #FFFFFF;
      letter-spacing: 2px;
      animation: glitch-name 3s infinite linear alternate-reverse;
    }
    
    .role-text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 15px;
      font-weight: 700;
      fill: #FF0000;
      letter-spacing: 1px;
      text-transform: uppercase;
      opacity: 0;
      animation: role-cycle 12s infinite;
    }
    
    .role-1 { animation-delay: 0s; }
    .role-2 { animation-delay: 4s; }
    .role-3 { animation-delay: 8s; }

    .terminal-title {
      font-family: monospace;
      font-size: 11px;
      fill: #555555;
    }

    .code-line {
      opacity: 0;
      animation: code-type-line 8s infinite;
    }
    .line-1 { animation-delay: 0.4s; }
    .line-2 { animation-delay: 0.8s; }
    .line-3 { animation-delay: 1.2s; }
    .line-4 { animation-delay: 1.6s; }
    .line-5 { animation-delay: 2.0s; }
    .line-6 { animation-delay: 2.4s; }
    .line-7 { animation-delay: 2.8s; }

    .cursor-blink {
      animation: cursor-blink 1s steps(2, start) infinite;
    }

    .float-card {
      animation: float-widget 4s infinite ease-in-out;
    }
  </style>

  <!-- Background Base -->
  <rect width="980" height="360" rx="12" fill="url(#panel-bg)" stroke="#1F1F1F" stroke-width="1.5"/>

  <!-- Cyber Grid Patterns -->
  <rect width="980" height="360" rx="12" fill="url(#cyber-grid)" pointer-events="none"/>
  <rect width="980" height="360" rx="12" fill="url(#pulsing-glow)" pointer-events="none"/>

  <!-- 1. LEFT PANEL: HACKER PORTRAIT WITH SCANLINE -->
  <g>
    <!-- Embedded Hacker Image -->
    <image href="https://raw.githubusercontent.com/nidhi14a-svg/nidhi14a-svg/main/banner.jpg" x="25" y="25" width="220" height="310" clip-path="url(#image-clip)"/>
    
    <!-- Moving Laser Scanline Sweep -->
    <line x1="25" y1="25" x2="245" y2="25" stroke="#FF0000" stroke-width="2" stroke-opacity="0.7" clip-path="url(#image-clip)">
      <animate attributeName="y1" values="25;335;25" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="25;335;25" dur="4.5s" repeatCount="indefinite"/>
    </line>

    <!-- Neon Glowing Border -->
    <rect x="25" y="25" width="220" height="310" rx="12" fill="none" stroke="#FF0000" stroke-width="1.5" stroke-opacity="0.8" style="filter: drop-shadow(0 0 5px rgba(255, 0, 0, 0.45));"/>
  </g>

  <!-- 2. RIGHT PANEL: HERO TEXT & ANIMS -->
  
  <!-- Dynamic Glitch Name Title -->
  <text class="text-name" x="280" y="65">NIDHI SINGH</text>

  <!-- Fading Typing Sub-Roles -->
  <g transform="translate(280, 100)">
    <text class="role-text role-1" x="0" y="0">Computer Science Student</text>
    <text class="role-text role-2" x="0" y="0">Full Stack Developer</text>
    <text class="role-text role-3" x="0" y="0">Chess Strategist</text>
    <text class="cursor-blink" x="310" y="0" font-family="monospace" font-size="16" fill="#FF0000" font-weight="bold">_</text>
  </g>

  <!-- 3. TERMINAL WIDGET: TYPING CODE LINES -->
  <g transform="translate(280, 130)">
    <!-- Terminal Background -->
    <rect width="320" height="205" rx="8" fill="#070404" fill-opacity="0.85" stroke="#1F0808" stroke-width="1.5"/>
    
    <!-- OS Windows Dots -->
    <circle cx="15" cy="14" r="4" fill="#FF5F56"/>
    <circle cx="27" cy="14" r="4" fill="#FFBD2E"/>
    <circle cx="39" cy="14" r="4" fill="#27C93F"/>
    <text class="terminal-title" x="55" y="18">dashboard.py</text>

    <!-- Typing Script Output -->
    <g font-family="monospace" font-size="10.5" fill="#808080" xml:space="preserve">
      <!-- Line 1 -->
      <text class="code-line line-1" x="15" y="42"><tspan fill="#FF0000">import</tspan> os, sys, time</text>
      <!-- Line 2 -->
      <text class="code-line line-2" x="15" y="62"><tspan fill="#FF0000">class</tspan> <tspan fill="#00D8FF">Developer</tspan>:</text>
      <!-- Line 3 -->
      <text class="code-line line-3" x="25" y="82"><tspan fill="#FF0000">def</tspan> <tspan fill="#27C93F">__init__</tspan>(self):</text>
      <!-- Line 4 -->
      <text class="code-line line-4" x="40" y="102">self.name = <tspan fill="#FFE873">"Nidhi Singh"</tspan></text>
      <!-- Line 5 -->
      <text class="code-line line-5" x="40" y="122">self.status = <tspan fill="#FFE873">"BUILDING..."</tspan></text>
      <!-- Line 6 -->
      <text class="code-line line-6" x="25" y="142"><tspan fill="#FF0000">def</tspan> <tspan fill="#27C93F">optimize</tspan>(self):</text>
      <!-- Line 7 -->
      <text class="code-line line-7" x="40" y="162"><tspan fill="#FF0000">return</tspan> self.status</text>
    </g>
  </g>

  <!-- 4. NETWORK WIDGET: DYNAMIC WAVEGRAPH & PULSING DATA POINTS -->
  <g transform="translate(620, 130)">
    <!-- Dashboard Widget Background -->
    <rect width="335" height="205" rx="8" fill="#070404" fill-opacity="0.85" stroke="#1F0808" stroke-width="1.5"/>
    <text class="terminal-title" x="15" y="18">NETWORK ACTIVITY // LIVE_STATS</text>

    <!-- Wave Graph Grid Lines -->
    <line x1="15" y1="40" x2="320" y2="40" stroke="#FF0000" stroke-width="0.3" stroke-opacity="0.1"/>
    <line x1="15" y1="80" x2="320" y2="80" stroke="#FF0000" stroke-width="0.3" stroke-opacity="0.1"/>
    <line x1="15" y1="120" x2="320" y2="120" stroke="#FF0000" stroke-width="0.3" stroke-opacity="0.1"/>
    <line x1="15" y1="160" x2="320" y2="160" stroke="#FF0000" stroke-width="0.3" stroke-opacity="0.1"/>

    <!-- Morphing Sine Wave Path -->
    <path fill="none" stroke="#FF0000" stroke-width="2.5" style="filter: drop-shadow(0 0 5px rgba(255, 0, 0, 0.65));">
      <animate attributeName="d" 
               values="M 15 140 Q 60 80, 105 120 T 195 100 T 285 130 T 320 90;
                       M 15 110 Q 60 150, 105 100 T 195 140 T 285 90 T 320 130;
                       M 15 140 Q 60 80, 105 120 T 195 100 T 285 130 T 320 90" 
               dur="6s" repeatCount="indefinite" />
    </path>

    <!-- Pulsing Node Ripple 1 -->
    <g transform="translate(105, 120)">
      <circle cx="0" cy="0" r="4" fill="#FF0000" />
      <circle cx="0" cy="0" r="4" fill="none" stroke="#FF0000" stroke-width="1.5">
        <animate attributeName="r" values="4;13;4" dur="2.2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="1;0;1" dur="2.2s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Pulsing Node Ripple 2 -->
    <g transform="translate(195, 100)">
      <circle cx="0" cy="0" r="4" fill="#FFFFFF" />
      <circle cx="0" cy="0" r="4" fill="none" stroke="#FFFFFF" stroke-width="1.5">
        <animate attributeName="r" values="4;13;4" dur="1.8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="1;0;1" dur="1.8s" repeatCount="indefinite"/>
      </circle>
    </g>
    
    <!-- Pulsing Node Ripple 3 -->
    <g transform="translate(285, 130)">
      <circle cx="0" cy="0" r="4" fill="#FF0000" />
      <circle cx="0" cy="0" r="4" fill="none" stroke="#FF0000" stroke-width="1.5">
        <animate attributeName="r" values="4;13;4" dur="2.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="1;0;1" dur="2.5s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <!-- 5. FLOATING UPLINK CARD -->
  <g class="float-card" transform="translate(620, 25)">
    <!-- Info Card Background -->
    <rect width="335" height="85" rx="8" fill="#070404" fill-opacity="0.85" stroke="#1F0808" stroke-width="1.5"/>
    
    <!-- Glowing green connection dot -->
    <circle cx="20" cy="24" r="4.5" fill="#27C93F">
      <animate attributeName="opacity" values="1;0.2;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    
    <text x="34" y="28" font-family="monospace" font-size="11.5" fill="#FFFFFF" font-weight="bold">SECURE SHELL: ACTIVE</text>
    <text x="34" y="47" font-family="monospace" font-size="10" fill="#808080">CORE_TEMP: 42°C // CPU_LOAD: 21%</text>
    <text x="34" y="64" font-family="monospace" font-size="10" fill="#FF0000">UPLINK: CONNECTED // 94.2 Mb/s</text>
  </g>
</svg>
