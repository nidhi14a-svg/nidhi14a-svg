<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="space-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#03050c"/>
      <stop offset="50%" stop-color="#080c1e"/>
      <stop offset="100%" stop-color="#010204"/>
    </linearGradient>

    <!-- Glassmorphic Card fill -->
    <linearGradient id="glass-panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#0b1329" stop-opacity="0.85"/>
    </linearGradient>

    <!-- Neon Accents -->
    <linearGradient id="neon-indigo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="neon-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="neon-pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>

    <!-- Spotlights -->
    <radialGradient id="glow-center" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-left" cx="20%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>

    <!-- Drop Shadows / Glows -->
    <filter id="laser-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    @keyframes drift {
      0%, 100% { transform: translateY(0) translateX(0); }
      50% { transform: translateY(-12px) translateX(6px); }
    }
    @keyframes draw-graph {
      0% { stroke-dashoffset: 1000; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes stream {
      0% { stroke-dashoffset: 32; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes typing {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes scale-bar {
      0%, 100% { transform: scaleY(1); }
      50% { transform: scaleY(0.5); }
    }
    @keyframes pulse-spot {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 0.9; }
    }
    @keyframes particle-rise {
      0% { transform: translateY(600px); opacity: 0; }
      20% { opacity: 0.4; }
      80% { opacity: 0.4; }
      100% { transform: translateY(100px); opacity: 0; }
    }

    .float-card-l { animation: bob 6s infinite ease-in-out; }
    .float-card-r { animation: drift 7s infinite ease-in-out; }
    .float-card-c { animation: bob 5s infinite ease-in-out 1s; }
    .spinning-dial { transform-origin: 75px 75px; animation: spin 12s infinite linear; }
    .graph-trace { stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: draw-graph 5s infinite ease-in-out; }
    .data-flow-dashed { stroke-dasharray: 8, 8; animation: stream 1.8s infinite linear; }
    .code-cursor { animation: typing 0.8s infinite steps(2); }
    .bar-grow-1 { transform-origin: 0px 50px; animation: scale-bar 1.6s infinite ease-in-out; }
    .bar-grow-2 { transform-origin: 0px 50px; animation: scale-bar 2s infinite ease-in-out 0.4s; }
    .bar-grow-3 { transform-origin: 0px 50px; animation: scale-bar 1.4s infinite ease-in-out 0.8s; }
    .spot-pulsing { animation: pulse-spot 4s infinite ease-in-out; }
    
    /* Background matrix-like tech particles */
    .part-1 { animation: particle-rise 12s infinite linear; }
    .part-2 { animation: particle-rise 15s infinite linear 3s; }
    .part-3 { animation: particle-rise 10s infinite linear 6s; }
  </style>

  <!-- Deep Space Tech Background -->
  <rect width="800" height="600" rx="16" fill="url(#space-bg)"/>

  <!-- Ambient Pulsing Glow Spotlights -->
  <circle cx="400" cy="200" r="320" fill="url(#glow-center)" class="spot-pulsing"/>
  <circle cx="150" cy="350" r="280" fill="url(#glow-left)"/>

  <!-- Tech Blueprint Grid Floor (Perspective) -->
  <g opacity="0.08">
    <line x1="0" y1="460" x2="800" y2="460" stroke="#FFFFFF" stroke-width="2"/>
    <line x1="0" y1="500" x2="800" y2="500" stroke="#FFFFFF" stroke-width="2"/>
    <line x1="0" y1="545" x2="800" y2="545" stroke="#FFFFFF" stroke-width="2"/>
    <line x1="0" y1="590" x2="800" y2="590" stroke="#FFFFFF" stroke-width="2"/>
    
    <line x1="150" y1="440" x2="80" y2="600" stroke="#FFFFFF" stroke-width="2"/>
    <line x1="280" y1="440" x2="220" y2="600" stroke="#FFFFFF" stroke-width="2"/>
    <line x1="400" y1="440" x2="400" y2="600" stroke="#FFFFFF" stroke-width="2"/>
    <line x1="520" y1="440" x2="580" y2="600" stroke="#FFFFFF" stroke-width="2"/>
    <line x1="650" y1="440" x2="720" y2="600" stroke="#FFFFFF" stroke-width="2"/>
  </g>

  <!-- Floating Coding Particles / Ambient Nodes -->
  <g fill="#6366f1" opacity="0.25">
    <circle class="part-1" cx="80" cy="0" r="2" />
    <circle class="part-2" cx="240" cy="0" r="1.5" />
    <circle class="part-3" cx="620" cy="0" r="2.5" />
    <circle class="part-1" cx="720" cy="0" r="1.5" />
    <circle class="part-2" cx="150" cy="0" r="2" />
  </g>

  <!-- SYSTEM ARCHITECTURE SIGNAL MATRIX OVERLAYS (SaaS data streams) -->
  <g opacity="0.12">
    <!-- Center to Left Connect -->
    <path d="M 400,200 C 300,100 200,100 120,180" fill="none" stroke="#6366f1" stroke-width="2.5" />
    <path class="data-flow-dashed" d="M 400,200 C 300,100 200,100 120,180" fill="none" stroke="#06b6d4" stroke-width="3" />

    <!-- Center to Right Connect -->
    <path d="M 400,200 C 500,100 600,100 680,180" fill="none" stroke="#6366f1" stroke-width="2.5" />
    <path class="data-flow-dashed" d="M 400,200 C 500,100 600,100 680,180" fill="none" stroke="#ec4899" stroke-width="3" />
  </g>

  <!-- COCKPIT STRUCTURE: Multi-Monitor Screens Display -->
  
  <!-- Left Side: Auxiliary Screen (Security / Backend logs) -->
  <g transform="translate(60, 160)" opacity="0.85">
    <!-- Frame -->
    <path d="M 0,20 L 100,0 L 100,180 L 0,160 Z" fill="#0c111d" stroke="#1f2937" stroke-width="2.5"/>
    <path d="M 4,22 L 96,5 L 96,175 L 4,158 Z" fill="#030712"/>
    
    <!-- Code Blocks inside screen -->
    <rect x="15" y="35" width="55" height="4" rx="2" fill="#6366f1" opacity="0.8"/>
    <rect x="15" y="47" width="70" height="4" rx="2" fill="#334155" opacity="0.8"/>
    <rect x="15" y="59" width="40" height="4" rx="2" fill="#06b6d4" opacity="0.8"/>
    <rect x="15" y="71" width="60" height="4" rx="2" fill="#334155" opacity="0.8"/>
    
    <path class="data-flow-dashed" d="M 20,100 L 80,110" stroke="#06b6d4" stroke-width="2"/>
    <circle cx="80" cy="110" r="3.5" fill="#06b6d4" filter="url(#laser-glow)"/>
  </g>

  <!-- Right Side: Auxiliary Screen (Analytics dashboard gauges) -->
  <g transform="translate(640, 160)" opacity="0.85">
    <!-- Frame -->
    <path d="M 0,0 L 100,20 L 100,160 L 0,180 Z" fill="#0c111d" stroke="#1f2937" stroke-width="2.5"/>
    <path d="M 4,5 L 96,22 L 96,158 L 4,175 Z" fill="#030712"/>
    
    <!-- Speedometer mock gauge -->
    <circle cx="50" cy="60" r="28" fill="none" stroke="#1e293b" stroke-width="5"/>
    <circle cx="50" cy="60" r="28" fill="none" stroke="#ec4899" stroke-width="5" stroke-dasharray="100, 180" stroke-linecap="round"/>
    <text x="50" y="65" font-family="sans-serif" font-size="12" font-weight="900" fill="#FFFFFF" text-anchor="middle">84%</text>
    
    <!-- Mini bars -->
    <rect x="25" y="110" width="10" height="30" rx="2" fill="#6366f1"/>
    <rect x="45" y="100" width="10" height="40" rx="2" fill="#06b6d4"/>
    <rect x="65" y="120" width="10" height="20" rx="2" fill="#8b5cf6"/>
  </g>

  <!-- Main Central Giant Display -->
  <g transform="translate(180, 110)">
    <!-- Main Ultrawide curved monitor frame -->
    <rect width="440" height="250" rx="14" fill="#0c111d" stroke="#334155" stroke-width="3.5" />
    <rect x="8" y="8" width="424" height="234" rx="8" fill="#020408" />

    <!-- Grid Layout inside giant screen -->
    <line x1="220" y1="8" x2="220" y2="242" stroke="#1e293b" stroke-width="1.5" stroke-dasharray="4, 4"/>

    <!-- Left Screen Pane: Advanced IDE Code Editor -->
    <g transform="translate(20, 20)">
      <circle cx="10" cy="10" r="3.5" fill="#EF4444"/>
      <circle cx="20" cy="10" r="3.5" fill="#F59E0B"/>
      <circle cx="30" cy="10" r="3.5" fill="#10B981"/>
      <rect x="50" y="6" width="70" height="8" rx="4" fill="#1e293b"/>
      
      <!-- Code lines typing -->
      <g font-family="monospace" font-size="10.5" fill="#cbd5e1" transform="translate(5, 36)">
        <text x="0" y="0"><tspan fill="#6366f1">import</tspan> { AI_Agent } <tspan fill="#6366f1">from</tspan> 'builder';</text>
        <text x="0" y="16"><tspan fill="#6366f1">const</tspan> dev = new Builder({</text>
        <text x="12" y="32">name: <tspan fill="#06b6d4">'Nidhi'</tspan>,</text>
        <text x="12" y="48">skills: [<tspan fill="#06b6d4">'FullStack'</tspan>],</text>
        <text x="12" y="64">logic: Core.AI_POWERED</text>
        <text x="0" y="80">});</text>
        <text x="0" y="96">dev.compile(); <tspan class="code-cursor" fill="#6366f1">|</tspan></text>
      </g>
    </g>

    <!-- Right Screen Pane: Dashboard Data Visualization (Live analytics style) -->
    <g transform="translate(240, 20)">
      <!-- Panel Header -->
      <rect x="0" y="6" width="80" height="8" rx="4" fill="#6366f1" opacity="0.8"/>
      
      <!-- Chart grid -->
      <line x1="10" y1="120" x2="170" y2="120" stroke="#1e293b" stroke-width="1"/>
      <line x1="10" y1="80" x2="170" y2="80" stroke="#1e293b" stroke-width="1"/>
      <line x1="10" y1="160" x2="170" y2="160" stroke="#1e293b" stroke-width="1"/>

      <!-- Spline Chart that loops drawing -->
      <path class="graph-trace" d="M 10,160 L 40,110 L 70,130 L 100,70 L 130,90 L 170,40" 
            fill="none" stroke="url(#neon-cyan)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#laser-glow)"/>
      
      <circle cx="100" cy="70" r="4.5" fill="#06b6d4" filter="url(#laser-glow)"/>
      <text x="100" y="60" font-family="sans-serif" font-size="9" font-weight="700" fill="#06b6d4">PEAK</text>

      <!-- System Health Indicator -->
      <g transform="translate(10, 185)">
        <rect width="160" height="30" rx="6" fill="#0c111d" stroke="#1e293b" stroke-width="1"/>
        <circle cx="15" cy="15" r="4" fill="#10B981" filter="url(#laser-glow)"/>
        <text x="28" y="19" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" font-weight="700" fill="#94a3b8">SYSTEMS RUNNING: ACTIVE</text>
      </g>
    </g>
  </g>

  <!-- Giant Console desk support base -->
  <path d="M 330,360 L 320,440 H 480 L 470,360 Z" fill="#0a0f1d" stroke="#1f2937" stroke-width="2"/>

  <!-- CENTRAL REALISTIC HUMAN SILHOUETTE (SOFTWARE BUILDER CREATING) -->
  <g transform="translate(400, 480)">
    <!-- Office Chair Headrest -->
    <rect x="-35" y="-120" width="70" height="24" rx="10" fill="#0f172a" stroke="#334155" stroke-width="2.5"/>
    <path d="M -12,-96 L -8,-80 H 8 L 12,-96 Z" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>

    <!-- Ergonomic Chair Backrest Frame -->
    <path d="M -55,-80 Q -65,30 -50,120 H 50 Q 65,30 55,-80 Z" fill="#090d16" stroke="#334155" stroke-width="3"/>
    <!-- Mesh backing texture lines -->
    <path d="M -45,-60 Q -50,20 -40,100" fill="none" stroke="#1e293b" stroke-width="1.5"/>
    <path d="M 45,-60 Q 50,20 40,100" fill="none" stroke="#1e293b" stroke-width="1.5"/>
    <path d="M -30,-70 Q -35,20 -25,110" fill="none" stroke="#1e293b" stroke-width="1.5"/>
    <path d="M 30,-70 Q 35,20 25,110" fill="none" stroke="#1e293b" stroke-width="1.5"/>
    <path d="M 0,-75 V 120" fill="none" stroke="#1e293b" stroke-width="2"/>

    <!-- Developer/Engineer Silhouette -->
    <!-- Head/Hair -->
    <path d="M -22,-86 Q -22,-108 0,-108 T 22,-86 Q 25,-75 20,-68 Q 12,-74 0,-74 T -20,-68 Q -25,-75 -22,-86 Z" fill="#020408"/>
    <!-- Neck -->
    <rect x="-10" y="-72" width="20" height="15" fill="#020408"/>
    <!-- Shoulders and Arms -->
    <path d="M -65,-40 C -55,-60 -35,-65 -25,-60 L -15,-57 H 15 L 25,-60 C 35,-65 55,-60 65,-40 L 75,50 H -75 Z" fill="#020408"/>
    <!-- Armrest Left -->
    <rect x="-78" y="-30" width="16" height="50" rx="8" fill="#1e293b" stroke="#334155" stroke-width="2"/>
    <path d="M -70,20 V 90" stroke="#334155" stroke-width="3.5" fill="none"/>
    <!-- Armrest Right -->
    <rect x="62" y="-30" width="16" height="50" rx="8" fill="#1e293b" stroke="#334155" stroke-width="2"/>
    <path d="M 70,20 V 90" stroke="#334155" stroke-width="3.5" fill="none"/>
  </g>

  <!-- LAYERED FLOATING GLASS DASHBOARDS (WOW FACTOR OVERLAYS) -->

  <!-- Left Float: Performance & Data Dashboard (Glassmorphic) -->
  <g class="float-card-l" transform="translate(60, 340)">
    <rect width="160" height="110" rx="10" fill="url(#glass-panel)" stroke="#334155" stroke-width="1.5" filter="url(#laser-glow)"/>
    <rect x="12" y="10" width="80" height="8" rx="4" fill="#6366f1"/>
    
    <!-- Mini stats chart -->
    <g transform="translate(15, 30)">
      <rect class="bar-grow-1" x="10" y="10" width="12" height="40" rx="2" fill="#6366f1"/>
      <rect class="bar-grow-2" x="28" y="10" width="12" height="40" rx="2" fill="#8b5cf6"/>
      <rect class="bar-grow-3" x="46" y="10" width="12" height="40" rx="2" fill="#06b6d4"/>
    </g>

    <!-- Side metrics -->
    <g transform="translate(95, 35)">
      <text x="0" y="10" font-family="sans-serif" font-size="10" font-weight="800" fill="#FFFFFF">ACTIVE APPS</text>
      <text x="0" y="24" font-family="sans-serif" font-size="14" font-weight="900" fill="#06b6d4" filter="url(#laser-glow)">+150%</text>
      <rect x="0" y="34" width="45" height="4" rx="2" fill="#1e293b"/>
      <rect x="0" y="34" width="30" height="4" rx="2" fill="#06b6d4"/>
    </g>
  </g>

  <!-- Right Float: Active Network Terminal (Glassmorphic) -->
  <g class="float-card-r" transform="translate(560, 360)">
    <rect width="180" height="120" rx="10" fill="url(#glass-panel)" stroke="#334155" stroke-width="1.5" filter="url(#laser-glow)"/>
    
    <!-- Header -->
    <circle cx="15" cy="15" r="3.5" fill="#ec4899" filter="url(#laser-glow)"/>
    <text x="28" y="19" font-family="monospace" font-size="9.5" fill="#64748b">gateway.api</text>

    <!-- Interactive Dial Chart -->
    <g transform="translate(15, 35)">
      <!-- Background wheel -->
      <circle cx="35" cy="35" r="25" fill="none" stroke="#1e293b" stroke-width="6"/>
      <!-- Active rotating gauge -->
      <circle class="spinning-dial" cx="35" cy="35" r="25" fill="none" stroke="url(#neon-pink)" stroke-dasharray="90, 160" stroke-width="6" stroke-linecap="round"/>
      <text x="35" y="40" font-family="sans-serif" font-size="12" font-weight="900" fill="#FFFFFF" text-anchor="middle">98.4</text>
    </g>

    <!-- Console Text log side -->
    <g font-family="monospace" font-size="9" fill="#94a3b8" transform="translate(90, 42)">
      <text x="0" y="0" fill="#10B981">GET 200 OK</text>
      <text x="0" y="12" fill="#10B981">GET 200 OK</text>
      <text x="0" y="24" fill="#6366f1">REQ STACK</text>
      <text x="0" y="36" fill="#F59E0B">WARN 304</text>
      <text x="0" y="48" fill="#10B981">PUSH DONE</text>
    </g>
  </g>

  <!-- Center Floating: High-Priority Metric Badge -->
  <g class="float-card-c" transform="translate(320, 50)">
    <rect width="160" height="42" rx="21" fill="url(#glass-panel)" stroke="#6366f1" stroke-width="2" filter="url(#laser-glow)"/>
    <circle cx="21" cy="21" r="5" fill="#10B981" filter="url(#laser-glow)"/>
    <text x="36" y="25" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" letter-spacing="0.5">BUILD ENGINE: ON</text>
  </g>
</svg>
