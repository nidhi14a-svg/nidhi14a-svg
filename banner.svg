<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="workspace-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090d16"/>
      <stop offset="100%" stop-color="#020408"/>
    </linearGradient>

    <!-- Glassmorphism Card Gradient -->
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0.85"/>
    </linearGradient>

    <!-- Glowing Accent Gradients -->
    <linearGradient id="indigo-cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="violet-pink" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>

    <!-- Radial Glows -->
    <radialGradient id="screen-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>

    <!-- Glow Filter -->
    <filter id="glow-filter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes pulse-screen {
      0%, 100% { filter: drop-shadow(0 0 1px rgba(99, 102, 241, 0.2)); }
      50% { filter: drop-shadow(0 0 8px rgba(99, 102, 241, 0.4)); }
    }
    @keyframes float-card-x {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }
    @keyframes draw-graph {
      to { stroke-dashoffset: 0; }
    }
    @keyframes flow-data {
      0% { stroke-dashoffset: 24; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes pulse-node {
      0%, 100% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.3); opacity: 1; }
    }
    @keyframes scale-bar {
      0%, 100% { transform: scaleY(1); }
      50% { transform: scaleY(0.4); }
    }

    .main-monitor {
      animation: pulse-screen 4s infinite ease-in-out;
    }
    .card-float-1 {
      animation: float-card-x 5s infinite ease-in-out;
    }
    .card-float-2 {
      animation: float-card-x 5s infinite ease-in-out 2.5s;
    }
    .graph-path {
      stroke-dasharray: 400;
      stroke-dashoffset: 400;
      animation: draw-graph 3s forwards cubic-bezier(0.4, 0, 0.2, 1);
    }
    .data-flow-line {
      stroke-dasharray: 6, 6;
      animation: flow-data 2s infinite linear;
    }
    .pulse-dot {
      transform-origin: center;
      animation: pulse-node 2s infinite ease-in-out;
    }
    .bar-anim-1 { transform-origin: 0px 240px; animation: scale-bar 1.8s infinite ease-in-out; }
    .bar-anim-2 { transform-origin: 0px 240px; animation: scale-bar 2.2s infinite ease-in-out 0.3s; }
    .bar-anim-3 { transform-origin: 0px 240px; animation: scale-bar 1.5s infinite ease-in-out 0.6s; }
  </style>

  <!-- Background -->
  <rect width="500" height="500" rx="12" fill="url(#workspace-bg)"/>

  <!-- Background Glow -->
  <circle cx="250" cy="200" r="200" fill="url(#screen-glow)"/>

  <!-- Blueprint grid floor -->
  <g opacity="0.05">
    <line x1="0" y1="360" x2="500" y2="360" stroke="#FFFFFF" stroke-width="1.5"/>
    <line x1="0" y1="390" x2="500" y2="390" stroke="#FFFFFF" stroke-width="1.5"/>
    <line x1="0" y1="420" x2="500" y2="420" stroke="#FFFFFF" stroke-width="1.5"/>
    <line x1="0" y1="450" x2="500" y2="450" stroke="#FFFFFF" stroke-width="1.5"/>
    <line x1="50" y1="350" x2="20" y2="480" stroke="#FFFFFF" stroke-width="1.5"/>
    <line x1="150" y1="350" x2="100" y2="480" stroke="#FFFFFF" stroke-width="1.5"/>
    <line x1="250" y1="350" x2="250" y2="480" stroke="#FFFFFF" stroke-width="1.5"/>
    <line x1="350" y1="350" x2="400" y2="480" stroke="#FFFFFF" stroke-width="1.5"/>
    <line x1="450" y1="350" x2="480" y2="480" stroke="#FFFFFF" stroke-width="1.5"/>
  </g>

  <!-- Developer Desk Setup (Minimalist & Sleek) -->
  <g class="main-monitor">
    <!-- Desk surface line -->
    <line x1="40" y1="360" x2="460" y2="360" stroke="#1E293B" stroke-width="3"/>
    
    <!-- Monitor Stand -->
    <path d="M 230,360 L 240,290 H 260 L 270,360 Z" fill="#0F172A" stroke="#1E293B" stroke-width="1.5"/>
    <rect x="210" y="355" width="80" height="6" rx="3" fill="#1E293B"/>

    <!-- Main Workspace Monitor -->
    <rect x="80" y="100" width="340" height="200" rx="10" fill="#090D16" stroke="#334155" stroke-width="2.5" />
    <rect x="90" y="110" width="320" height="180" rx="6" fill="#030712" />

    <!-- Mock IDE / Dashboard code header -->
    <circle cx="105" cy="120" r="3.5" fill="#EF4444"/>
    <circle cx="115" cy="120" r="3.5" fill="#F59E0B"/>
    <circle cx="125" cy="120" r="3.5" fill="#10B981"/>
    <rect x="145" y="116" width="60" height="8" rx="4" fill="#1E293B" opacity="0.6"/>

    <!-- Screen Data Visualization Graph -->
    <g opacity="0.3">
      <line x1="120" y1="170" x2="380" y2="170" stroke="#1E293B" stroke-width="1"/>
      <line x1="120" y1="210" x2="380" y2="210" stroke="#1E293B" stroke-width="1"/>
      <line x1="120" y1="250" x2="380" y2="250" stroke="#1E293B" stroke-width="1"/>
    </g>

    <!-- Main Screen Graph Line -->
    <path class="graph-path" d="M 120,250 L 160,200 L 200,230 L 240,160 L 280,185 L 320,130 L 380,150" 
          fill="none" stroke="url(#indigo-cyan)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Pulse target dot on graph -->
    <circle class="pulse-dot" cx="320" cy="130" r="5" fill="#06B6D4" filter="url(#glow-filter)"/>
  </g>

  <!-- Left Floating Card: UI Component & System Architecture -->
  <g class="card-float-1" transform="translate(30, 160)">
    <rect width="120" height="90" rx="8" fill="url(#card-grad)" stroke="#334155" stroke-width="1.5" filter="url(#glow-filter)"/>
    <rect x="10" y="10" width="100" height="6" rx="3" fill="#6366F1" opacity="0.7"/>
    
    <!-- Mini Systems Architecture nodes -->
    <circle cx="35" cy="45" r="5" fill="#6366F1"/>
    <circle cx="85" cy="35" r="4" fill="#06B6D4"/>
    <circle cx="85" cy="55" r="4" fill="#8B5CF6"/>
    
    <!-- Connection lines -->
    <line x1="35" y1="45" x2="85" y2="35" stroke="#475569" stroke-width="1"/>
    <line x1="35" y1="45" x2="85" y2="55" stroke="#475569" stroke-width="1"/>
    <path class="data-flow-line" d="M 35,45 L 85,35" stroke="#6366F1" stroke-width="1.5" fill="none"/>
    
    <rect x="10" y="72" width="60" height="6" rx="3" fill="#475569" opacity="0.5"/>
    <rect x="85" y="72" width="25" height="6" rx="3" fill="#10B981" opacity="0.8"/>
  </g>

  <!-- Right Floating Card: Analytics Bars -->
  <g class="card-float-2" transform="translate(350, 220)">
    <rect width="110" height="95" rx="8" fill="url(#card-grad)" stroke="#334155" stroke-width="1.5" filter="url(#glow-filter)"/>
    <rect x="10" y="10" width="90" height="6" rx="3" fill="#8B5CF6" opacity="0.7"/>
    
    <!-- Interactive bar chart cards -->
    <g transform="translate(20, 20)">
      <!-- Bar 1 -->
      <rect class="bar-anim-1" x="10" y="10" width="12" height="50" rx="3" fill="#8B5CF6" />
      <!-- Bar 2 -->
      <rect class="bar-anim-2" x="32" y="10" width="12" height="50" rx="3" fill="#6366F1" />
      <!-- Bar 3 -->
      <rect class="bar-anim-3" x="54" y="10" width="12" height="50" rx="3" fill="#06B6D4" />
    </g>
  </g>

  <!-- Floating Digital Code Packets -->
  <g opacity="0.3">
    <circle cx="110" cy="80" r="3" fill="#6366F1"/>
    <line x1="110" y1="80" x2="160" y2="40" stroke="#6366F1" stroke-width="1" stroke-dasharray="2"/>
    <circle cx="160" cy="40" r="4" fill="#06B6D4" class="pulse-dot"/>
    
    <circle cx="380" cy="70" r="2.5" fill="#8B5CF6"/>
    <line x1="380" y1="70" x2="330" y2="30" stroke="#8B5CF6" stroke-width="1" stroke-dasharray="2"/>
    <circle cx="330" cy="30" r="3.5" fill="#6366F1"/>
  </g>
</svg>
