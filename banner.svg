<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Dark Premium Background Gradient -->
    <linearGradient id="illustration-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>

    <!-- Radial Accent Glows -->
    <radialGradient id="indigo-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violet-glow" cx="40%" cy="60%" r="45%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>

    <!-- Chess Knight Line Gradients -->
    <linearGradient id="wireframe-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" rx="12" fill="url(#illustration-bg)"/>

  <!-- Glows -->
  <circle cx="250" cy="250" r="220" fill="url(#indigo-glow)"/>
  <circle cx="200" cy="300" r="180" fill="url(#violet-glow)"/>

  <!-- Minimal Blueprint Tech Grid -->
  <g opacity="0.08">
    <line x1="50" y1="50" x2="450" y2="50" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="50" y1="110" x2="450" y2="110" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="50" y1="170" x2="450" y2="170" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="50" y1="230" x2="450" y2="230" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="50" y1="290" x2="450" y2="290" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="50" y1="350" x2="450" y2="350" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="50" y1="410" x2="450" y2="410" stroke="#FFFFFF" stroke-width="1"/>
    
    <line x1="50" y1="50" x2="50" y2="450" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="110" y1="50" x2="110" y2="450" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="170" y1="50" x2="170" y2="450" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="230" y1="50" x2="230" y2="450" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="290" y1="50" x2="290" y2="450" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="350" y1="50" x2="350" y2="450" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="410" y1="50" x2="410" y2="450" stroke="#FFFFFF" stroke-width="1"/>
  </g>

  <!-- Abstract Code Nodes & Strategic Chess Board Tiles -->
  <g opacity="0.15" transform="translate(10, 30)">
    <polygon points="120,380 240,320 360,380 240,440" fill="#1e1b4b" stroke="#6366F1" stroke-width="1.5"/>
    <line x1="240" y1="320" x2="240" y2="220" stroke="#6366F1" stroke-width="1.5" stroke-dasharray="4"/>
    <circle cx="240" cy="220" r="4" fill="#6366F1"/>
  </g>

  <!-- The Cybernetic Chess Knight -->
  <g transform="translate(250, 220)">
    <!-- Flat Shadow base -->
    <ellipse cx="0" cy="150" rx="80" ry="15" fill="#000000" opacity="0.3"/>

    <!-- Knight Silhouette / Base wireframe shape -->
    <path d="M -60,140 H 60 V 120 H 40 V 100 H 30 L 25,40 L 45,-20 L 30,-70 L 10,-120 L 15,-140 L -15,-120 L -40,-120 L -90,-70 L -95,-50 L -75,-35 L -50,-25 L -75,40 Z" 
          fill="#0B0F19" 
          stroke="url(#wireframe-grad)" 
          stroke-width="3" 
          stroke-linejoin="round"
          filter="url(#neon-glow)" />

    <!-- Technical Inner Circuits / Connections -->
    <path d="M -65,-35 L -40,-15 V 40 L -10,70" stroke="#818CF8" stroke-width="2" fill="none" opacity="0.7"/>
    <path d="M -20,-115 L -25,-80 L 0,-50 V 10 L 20,40" stroke="#06B6D4" stroke-width="2" fill="none" opacity="0.7"/>
    <path d="M 0,-120 L 5,-60 L 0,-30" stroke="#8B5CF6" stroke-width="1.5" fill="none" opacity="0.6"/>

    <!-- Glowing Strategic Intel Eye -->
    <circle cx="-40" cy="-70" r="5" fill="#38BDF8" filter="url(#neon-glow)"/>
    <circle cx="0" cy="-60" r="3.5" fill="#818CF8"/>
    <circle cx="-10" cy="70" r="4.5" fill="#6366F1" filter="url(#neon-glow)"/>
    <circle cx="20" cy="40" r="3.5" fill="#06B6D4"/>
  </g>

  <!-- Abstract Strategic Floating Dots -->
  <g opacity="0.35">
    <circle cx="100" cy="150" r="3" fill="#6366F1" filter="url(#neon-glow)"/>
    <line x1="100" y1="150" x2="160" y2="190" stroke="#6366F1" stroke-width="1" stroke-dasharray="3"/>
    <circle cx="160" cy="190" r="4" fill="#06B6D4"/>

    <circle cx="400" cy="120" r="3" fill="#8B5CF6"/>
    <line x1="400" y1="120" x2="350" y2="170" stroke="#8B5CF6" stroke-width="1" stroke-dasharray="3"/>
    <circle cx="350" cy="170" r="3" fill="#6366F1"/>
  </g>
</svg>
