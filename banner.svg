<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Light Mode Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>

    <!-- Soft Glows -->
    <radialGradient id="glow-indigo" cx="80%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#EEF2FF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#EEF2FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-cyan" cx="20%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#ECFDF5" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ECFDF5" stop-opacity="0"/>
    </radialGradient>

    <!-- Knight Gradient -->
    <linearGradient id="knight-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>

    <!-- Subtle Shadows -->
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.05"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg-grad)"/>

  <!-- Radial Glow Accents -->
  <circle cx="950" cy="180" r="320" fill="url(#glow-indigo)"/>
  <circle cx="200" cy="220" r="280" fill="url(#glow-cyan)"/>

  <!-- Clean Grid Pattern (Apple/Linear Style) -->
  <g opacity="0.45">
    <line x1="50" y1="50" x2="1150" y2="50" stroke="#F1F5F9" stroke-width="1.5"/>
    <line x1="50" y1="120" x2="1150" y2="120" stroke="#F1F5F9" stroke-width="1.5"/>
    <line x1="50" y1="190" x2="1150" y2="190" stroke="#F1F5F9" stroke-width="1.5"/>
    <line x1="50" y1="260" x2="1150" y2="260" stroke="#F1F5F9" stroke-width="1.5"/>
    <line x1="50" y1="330" x2="1150" y2="330" stroke="#F1F5F9" stroke-width="1.5"/>
    <line x1="100" y1="50" x2="100" y2="350" stroke="#F1F5F9" stroke-width="1.5"/>
    <line x1="250" y1="50" x2="250" y2="350" stroke="#F1F5F9" stroke-width="1.5"/>
    <line x1="400" y1="50" x2="400" y2="350" stroke="#F1F5F9" stroke-width="1.5"/>
    <line x1="550" y1="50" x2="550" y2="350" stroke="#F1F5F9" stroke-width="1.5"/>
    <line x1="700" y1="50" x2="700" y2="350" stroke="#F1F5F9" stroke-width="1.5"/>
    <line x1="850" y1="50" x2="850" y2="350" stroke="#F1F5F9" stroke-width="1.5"/>
    <line x1="1000" y1="50" x2="1000" y2="350" stroke="#F1F5F9" stroke-width="1.5"/>
  </g>

  <!-- Code Graphic Backdrop (Very Subtle) -->
  <g font-family="monospace" font-size="11" fill="#94A3B8" opacity="0.18">
    <text x="680" y="110">const planStrategy = (game) => {</text>
    <text x="680" y="130">  const path = calculateBestRoute(game);</text>
    <text x="680" y="150">  return path.optimize();</text>
    <text x="680" y="170">};</text>
  </g>

  <!-- Modern Decorative Dot Grid -->
  <g fill="#CBD5E1" opacity="0.3" transform="translate(1050, 60)">
    <circle cx="10" cy="10" r="1.5" />
    <circle cx="25" cy="10" r="1.5" />
    <circle cx="40" cy="10" r="1.5" />
    <circle cx="10" cy="25" r="1.5" />
    <circle cx="25" cy="25" r="1.5" />
    <circle cx="40" cy="25" r="1.5" />
    <circle cx="10" cy="40" r="1.5" />
    <circle cx="25" cy="40" r="1.5" />
    <circle cx="40" cy="40" r="1.5" />
  </g>

  <!-- Right Side: Minimalist 3D/Isometric Chess Knight -->
  <g transform="translate(900, 160)" filter="url(#soft-shadow)">
    <!-- Base Shadow -->
    <ellipse cx="0" cy="140" rx="65" ry="12" fill="#64748B" opacity="0.1"/>

    <!-- Geometric Light Chess Knight Path -->
    <path d="M -50,130 H 50 V 110 H 30 V 90 H 20 L 15,30 L 35,-30 L 20,-80 L 0,-130 L 5,-150 L -25,-130 L -50,-130 L -100,-80 L -105,-60 L -85,-45 L -60,-35 L -85,30 Z" 
          fill="#FFFFFF" 
          stroke="url(#knight-grad)" 
          stroke-width="3" 
          stroke-linejoin="round" />

    <!-- Sleek Minimal Accent Lines on Knight -->
    <path d="M -75,-45 L -50,-25 V 30 L -20,60" stroke="#818CF8" stroke-width="1.5" fill="none" opacity="0.5"/>
    <path d="M -30,-125 L -35,-90 L -10,-60 V 0 L 10,30" stroke="#06B6D4" stroke-width="1.5" fill="none" opacity="0.5"/>
    <path d="M -10,-130 L -5,-70 L -10,-40" stroke="#818CF8" stroke-width="1.5" fill="none" opacity="0.5"/>

    <!-- Cyber-Logic Eye -->
    <circle cx="-50" cy="-80" r="4.5" fill="#6366F1"/>
  </g>

  <!-- Left Side: Sleek Typography Branding -->
  <g transform="translate(100, 0)">
    <!-- Active Status Pill -->
    <g transform="translate(0, 80)">
      <rect width="135" height="28" rx="14" fill="#EEF2FF" stroke="#E0E7FF" stroke-width="1"/>
      <circle cx="16" cy="14" r="4" fill="#6366F1"/>
      <text x="28" y="18" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="700" fill="#4F46E5" letter-spacing="1">STUDENT &amp; DEV</text>
    </g>

    <!-- Primary Name Heading -->
    <text x="0" y="185" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif" font-size="64" font-weight="800" fill="#0F172A" letter-spacing="-1.5">
      Nidhi Singh
    </text>

    <!-- Clean Strategy Headline -->
    <text x="0" y="235" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="600" fill="#475569" letter-spacing="-0.5">
      Building software with strategy, curiosity and consistency.
    </text>

    <!-- Subtitle Role Tags -->
    <text x="0" y="270" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="500" fill="#94A3B8" letter-spacing="3">
      COMPUTER SCIENCE STUDENT • FULL STACK DEVELOPER • CHESS STRATEGIST
    </text>

    <!-- Tech/Design Accent Bar -->
    <rect x="0" y="310" width="120" height="4" rx="2" fill="url(#knight-grad)" />
  </g>
</svg>
